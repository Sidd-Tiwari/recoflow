name: RecoFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: recoflow
          POSTGRES_PASSWORD: recoflow
          POSTGRES_DB: recoflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recoflow -d recoflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/recoflow_test
      SPRING_DATASOURCE_USERNAME: recoflow
      SPRING_DATASOURCE_PASSWORD: recoflow
      JWT_SECRET: test-secret-for-ci

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------
    # Setup Node.js
    # -------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm install

    - name: Run frontend build
      working-directory: frontend
      run: npm run build

    # -------------------
    # Setup Java 21
    # -------------------
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 21

    # -------------------
    # Make Maven wrapper executable
    # -------------------
    - name: Make mvnw executable
      run: chmod +x mvnw

    # -------------------
    # Build and test backend
    # -------------------
    - name: Build backend & run tests
      run: ./mvnw verify -P test
