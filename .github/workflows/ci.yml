name: RecoFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: recoflow
          POSTGRES_PASSWORD: recoflow
          POSTGRES_DB: recoflow_test
        options: >-
          --health-cmd "pg_isready -U recoflow -d recoflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/recoflow_test
      SPRING_DATASOURCE_USERNAME: recoflow
      SPRING_DATASOURCE_PASSWORD: recoflow
      JWT_SECRET: test-secret-for-ci

    steps:
      # -------------------
      # Checkout code
      # -------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------
      # Setup Node.js
      # -------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # -------------------
      # Setup Java
      # -------------------
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # -------------------
      # Wait for PostgreSQL
      # -------------------
      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to start..."
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 -U recoflow -d recoflow_test && break
            sleep 2
          done

      # -------------------
      # Cache Maven dependencies
      # -------------------
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -------------------
      # Build backend & run tests
      # -------------------
      - name: Build backend & run tests
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw verify -P test